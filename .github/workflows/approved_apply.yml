name: Approved Job Apply Automation

on:
  workflow_dispatch:
    inputs:
      approval:
        description: "Type APPLY to approve sending direct-email job applications"
        required: true
        type: string

jobs:
  approved-apply:
    if: ${{ github.event.inputs.approval == 'APPLY' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -c "import sys; print(sys.version)"
          python -c "import crewai; print(crewai.__version__)"

      - name: Run Approved Apply Bot
        env:
          PYTHONPATH: src
          APPLY_APPROVED: "true"
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          RESUME_FILE_PATH: knowledge/resume/Bhavin_Khatri_resume.pdf
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: |
          python -m canadian_hr_job_search_assistant.main run-once

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: approved-apply-reports
          path: |
            reports/**
            logs/**
