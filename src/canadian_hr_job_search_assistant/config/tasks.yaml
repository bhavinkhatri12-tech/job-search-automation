---
research_job_listings:
  description: 'Search for and analyze current job listings for {job_search_domain} roles using the search query: {job_search_query}. Prioritize these sources: {job_sources}. Find only the 5 strongest current opportunities matching HR Coordinator, HR Generalist, Talent Acquisition Specialist, Recruiter, and mid-level HRBP positions. For each job, extract job title, company, location, 3-5 key requirements, application URL, application instructions, and any direct recruiter/employer email if present. Keep findings concise.'
  expected_output: A concise structured list of up to 5 job opportunities with job title, company, location, key requirements, posting URL, and application instructions.
  agent: job_research_specialist
score_and_match_jobs:
  description: 'Evaluate each job opportunity against the candidate profile: Bhavin
    Khatri (12+ years HR/Admin/Recruitment experience, Nova Scotia based). Score each
    job from 0-100 based on skills match, experience alignment, location compatibility,
    and role relevance. Apply priority scoring: Talent Acquisition/Recruiter (+15),
    HR Generalist/Coordinator (+10), mid-level HRBP (+5). Categorize jobs by domain
    and recommend only the best 3-5 jobs scoring 65+. Avoid senior-level roles
    (Director, VP) and positions requiring >5 years strict Canadian experience.'
  expected_output: A ranked list of up to 5 job opportunities with match scores, domain categorization
    (HRBP/TA/Recruiter/HR Ops), priority ratings, and clear recommendations for which
    jobs to apply to, including reasoning for each recommendation
  agent: job_matching_analyst
  context:
  - research_job_listings
optimize_resume:
  description: 'Create concise resume optimization notes for the top 3 recommended jobs. For each job, provide a targeted professional summary, 5 ATS keywords, and 3 bullets to emphasize from Bhavin''s HR/Admin/Recruitment background. Ensure Canadian market formatting standards.'
  expected_output: Resume optimization notes for up to 3 job opportunities, with targeted summary, keywords, and highlighted experience bullets.
  agent: resume_optimization_expert
  context:
  - score_and_match_jobs
create_cover_letters:
  description: 'Generate short cover letter drafts for the top 3 recommended job opportunities. Each letter should be 2 concise paragraphs, demonstrate company/role relevance, and align with Canadian business communication standards.'
  expected_output: Short personalized cover letter drafts for up to 3 job opportunities.
  agent: cover_letter_specialist
  context:
  - score_and_match_jobs
prepare_application_packages:
  description: Compile complete, application-ready packages for each recommended job
    opportunity. Organize the tailored resume, customized cover letter, and prepare
    suggested responses to common application questions (e.g., salary expectations,
    availability, relocation willingness, work authorization, sponsorship). For Canadian
    roles, state that Bhavin is a Canadian Permanent Resident, arrived in Canada on
    2024-06-21, is authorized to work for any employer in Canada, and does not require
    sponsorship. Do not claim US work authorization unless the job explicitly allows
    Canadian-based candidates or remote Canada employment. Use this resume attachment path:
    {resume_file_path}. Create a checklist for each application
    including required documents, application method (company website vs. job portal),
    and any specific submission requirements. Ensure all materials are consistent,
    professionally formatted, and ready for immediate submission.
  expected_output: Complete application packages for each job opportunity, including
    final resume versions, cover letters, application question responses, submission
    checklists, and any additional required materials, all organized and ready for
    application
  agent: application_package_coordinator
  context:
  - optimize_resume
  - create_cover_letters
submit_applications:
  description: >
    Attempt to submit applications for every recommended job from the prepared
    application packages. For jobs with a direct employer or recruiter email address
    in the posting or application instructions, use the submit_application_email tool
    to prepare or send a concise application email using the tailored cover letter
    content and candidate details. The tool sends only when APPLY_APPROVED is true;
    otherwise it returns APPROVAL_REQUIRED and no email is sent. For jobs that only
    provide a company website, ATS portal,
    job board apply button, login page, captcha, or missing contact information, do
    not claim submission; mark the status as Manual Portal Required and include the
    exact URL and next action. Never invent employer email addresses and never mark
    a job Applied unless the tool returns SENT.
  expected_output: >
    A truthful application submission log for every recommended job, including
    company, job title, submission channel, status (Applied by Email, Approval
    Required, Manual Portal Required, or Skipped), confirmation/tool result when sent, application URL,
    and next action for anything not submitted.
  agent: application_submission_specialist
  context:
  - prepare_application_packages
track_job_applications:
  description: 'Create and maintain a comprehensive tracking system for all analyzed
    job opportunities. Record details for each job: date analyzed, company name, job
    title, domain category (HRBP/Recruiter/TA/HR Ops), location, match score, application
    status (Applied by Email/Manual Portal Required/Skipped/Interview/Rejected),
    resume version used, and follow-up dates. Use the submit_applications result as
    the source of truth for application status; never infer Applied from a prepared
    package alone. Organize data in a structured format suitable for Google Sheets
    or similar tracking tools. Include status updates and notes section for each entry.'
  expected_output: A structured tracking database with all job opportunities, their
    details, match scores, application status, and relevant notes organized in a format
    ready for spreadsheet import
  agent: job_search_tracker
  context:
  - score_and_match_jobs
  - prepare_application_packages
  - submit_applications
generate_daily_report:
  description: 'Create a comprehensive daily summary report including: total jobs
    analyzed, breakdown by domain (HRBP/Talent Acquisition/Recruiter/HR Ops), top
    5 recommended jobs with match scores, number of application packages prepared,
    number actually submitted, number requiring manual portal submission, key insights
    about market trends, and strategic recommendations for next steps. Include
    highlights of the strongest opportunities and any patterns identified in job
    requirements. Be explicit that only jobs marked Applied by Email were submitted;
    portal-only jobs are not submitted automatically. Provide actionable insights for
    improving application success and market positioning.'
  expected_output: A professional daily report summarizing all job search activities,
    top opportunities, true submission status, application readiness status, market
    insights, and strategic recommendations for continued job search success in the
    Canadian market
  agent: daily_job_search_reporter
  context:
  - track_job_applications
  - prepare_application_packages
  - submit_applications
